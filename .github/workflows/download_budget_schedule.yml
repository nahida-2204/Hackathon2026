name: Automated Budget Downloader

# 1. Trigger: Run automatically on a schedule (Cron)
on:
  schedule:
    # This cron syntax means: "At 12:00 UTC on July 1st every year"
    - cron: '0 12 1 7 *'
  workflow_dispatch: # This allows you to manually run the script anytime with a button click on GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest # GitHub spins up a temporary Linux computer

    steps:
      # Step 1: Copy your repository files onto the virtual computer
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual computer
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install the required libraries (requests, beautifulsoup4)
      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      # Step 4: Run your budget downloader script
      # (Make sure this matches your python file name!)
      - name: Run Python script
        run: python scripts/download_script.py

      # # Step 5: Commit and push ONLY if a new PDF was actually downloaded to the PDF folder
      - name: Commit and push PDF back to repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # Check if there are any modified or untracked PDF files in the PDFS folder
          if git status --porcelain | grep -q 'backend/docs/pdfs/.*\.pdf'; then
            echo "New PDF found in backend/docs/pdfs! Committing..."
            git add backend/docs/pdfs/*.pdf
            git commit -m "Auto-downloaded budget for this year into PDF folder"
            git push
          else
            echo "No new PDF files to commit. Exiting cleanly."
          fi